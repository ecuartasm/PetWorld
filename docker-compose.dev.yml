services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: petworld
      POSTGRES_PASSWORD: petworld
      POSTGRES_DB: petworld
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petworld"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
