services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: petworld
      POSTGRES_PASSWORD: petworld
      POSTGRES_DB: petworld
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petworld"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://petworld:petworld@db:5432/petworld?schema=public"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      APP_SECRET: "${APP_SECRET:-dev-secret-change-in-production-must-be-at-least-32-chars-long!!}"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      SESSION_MAX_AGE_DAYS: "30"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
